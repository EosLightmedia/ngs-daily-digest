name: NGS Daily Digest

on:
  schedule:
    # 21:00 UTC = 5:00 PM EDT (event runs in June, so Eastern is on DST).
    # Posts the NEXT day's digest the evening before.
    - cron: "0 21 * * *"
    # One-time extra send: 01:00 UTC Jun 14 = 9:00 PM EDT Jun 13 (re-post Jun 14's
    # card after late updates). Re-fires Jun 14 next year, but the digest skips
    # days with no schedule block, so it self-cleans.
    - cron: "0 1 14 6 *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional YYYY-MM-DD to report (default: tomorrow)"
        required: false
      dry_run:
        description: "Render + print caption, post nothing"
        type: boolean
        default: false
      note:
        description: "Optional bold note prepended to the caption (e.g. UPDATED)"
        required: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post digest
        env:
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID || 'C0B9YCS6ALR' }}
        run: |
          # Default to tomorrow in Eastern (the evening-before post). Computed in
          # America/New_York so it's correct whether the run fires before or after
          # 00:00 UTC (e.g. the 5 PM and the 9 PM ET triggers).
          TARGET="${{ inputs.date }}"
          if [ -z "$TARGET" ]; then TARGET="$(TZ='America/New_York' date -d 'tomorrow' +%F)"; fi
          # Any scheduled run other than the daily 5 PM cron is an extra/one-time
          # send -> mark it "UPDATED" (time-agnostic, so changing the one-time
          # cron's hour won't break this). A manual note input overrides.
          NOTE_FLAG=""
          if [ -n "${{ inputs.note }}" ]; then
            NOTE_FLAG="--note ${{ inputs.note }}"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "0 21 * * *" ]; then
            NOTE_FLAG="--note UPDATED"
          fi
          echo "Target date: $TARGET   note: ${NOTE_FLAG:-(none)}"
          python digest.py --date "$TARGET" $NOTE_FLAG ${{ inputs.dry_run && '--dry-run' || '' }}
