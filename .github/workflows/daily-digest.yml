name: NGS Daily Digest

on:
  schedule:
    # 21:00 UTC = 5:00 PM EDT (event runs in June, so Eastern is on DST).
    # Posts the NEXT day's digest the evening before.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional YYYY-MM-DD to report (default: tomorrow)"
        required: false
      dry_run:
        description: "Render + print caption, post nothing"
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post digest
        env:
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID || 'C0B9YCS6ALR' }}
        run: |
          # Default to tomorrow (the evening-before post). At 21:00 UTC the UTC
          # date matches Eastern, so UTC +1 day == Eastern's tomorrow.
          TARGET="${{ inputs.date }}"
          if [ -z "$TARGET" ]; then TARGET="$(date -u -d 'tomorrow' +%F)"; fi
          echo "Target date: $TARGET"
          python digest.py --date "$TARGET" ${{ inputs.dry_run && '--dry-run' || '' }}
